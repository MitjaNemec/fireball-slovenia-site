colorScheme = "blowfish"
defaultAppearance = "light"
autoSwitchAppearance = true
enableSearch = true
mainSections = ["news"]
Logo = "img/FBL_web_logo.png"
LogoLight = "img/FBL_web_logo_light.png"
LogoDark = "img/FBL_web_logo_dark.png"
disableTextInHeader = true

[header]
  layout = "basic"

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "page"
  showRecent = true
  showRecentItems = 3
  showMoreLink = true
  showMoreLinkDest = "/news/"
  cardView = false

[article]
  showDate = true
  showAuthor = false
  showReadingTime = true
  showTableOfContents = false
  showTaxonomies = false

[list]
  showSummary = true
  showCards = false
  groupByYear = false
